<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Gen</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="text">
        <h2>Password <br />Generator</h2>
      </div>
      <div class="textBox">
        
        <input type="text" id="RandomPass" placeholder="Your Password" />
        <button onclick="genPassword()">Generate Password</button>
      </div>
      <div class="images">
        <img src="/img/copy logo.png" onclick="copyPassword()" id="Copy" />
      </div>
    </div>
  </body>
</html>
